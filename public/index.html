<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réceptionniste IA — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a35;
    --accent: #7c6dfa;
    --accent2: #fa6d8f;
    --green: #4ade80;
    --amber: #fbbf24;
    --text: #f0eeff;
    --muted: #7070a0;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  /* Grid background subtile */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* HEADER */
  header {
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }

  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--green);
    padding: 6px 12px;
    background: rgba(74, 222, 128, 0.08);
    border: 1px solid rgba(74, 222, 128, 0.2);
    border-radius: 20px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* MAIN */
  main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    transition: border-color 0.2s;
    animation: fadeIn 0.4s ease forwards;
    opacity: 0;
  }

  .stat-card:hover { border-color: var(--accent); }
  .stat-card:nth-child(1) { animation-delay: 0.1s; }
  .stat-card:nth-child(2) { animation-delay: 0.2s; }
  .stat-card:nth-child(3) { animation-delay: 0.3s; }
  .stat-card:nth-child(4) { animation-delay: 0.4s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-trend {
    font-size: 12px;
    color: var(--green);
  }

  .accent-purple { color: var(--accent); }
  .accent-pink { color: var(--accent2); }
  .accent-green { color: var(--green); }
  .accent-amber { color: var(--amber); }

  /* SECTION TITRE */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
  }

  /* TABLE */
  .table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 14px 20px;
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  td {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(42,42,53,0.5);
    font-size: 14px;
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(124, 109, 250, 0.04); }

  .caller-info { display: flex; flex-direction: column; gap: 2px; }
  .caller-name { font-weight: 500; }
  .caller-phone { font-size: 12px; color: var(--muted); }

  .probleme-text {
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--muted);
    font-size: 13px;
  }

  .resume-text {
    max-width: 250px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }

  .badge-nouveau {
    background: rgba(124,109,250,0.15);
    color: var(--accent);
    border: 1px solid rgba(124,109,250,0.3);
  }

  .badge-confirme {
    background: rgba(74,222,128,0.1);
    color: var(--green);
    border: 1px solid rgba(74,222,128,0.2);
  }

  .duree-text { font-size: 13px; color: var(--muted); }

  .date-text {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 560px;
    max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
  }

  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-close:hover { color: var(--text); }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .info-block label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .info-block .value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .resume-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-top: 16px;
  }

  .resume-block label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 10px;
  }

  .resume-block p {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  /* VIDE */
  .empty-state {
    text-align: center;
    padding: 60px 40px;
    color: var(--muted);
  }

  .empty-icon { font-size: 40px; margin-bottom: 16px; }
  .empty-title { font-family: var(--font-display); font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; }

  .endpoint-box {
    margin-top: 16px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: monospace;
    font-size: 13px;
    color: var(--accent);
    display: inline-block;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">🎙</div>
      <div>
        <div class="logo-text">Réceptionniste IA</div>
        <div class="logo-sub">Dashboard des appels</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="live-badge">
        <div class="live-dot"></div>
        En ligne
      </div>
      <button class="btn btn-ghost" onclick="loadAppels()">↻ Actualiser</button>
      <button class="btn btn-primary" onclick="addTestData()">+ Test</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total appels</div>
        <div class="stat-value accent-purple" id="stat-total">0</div>
        <div class="stat-trend">Aujourd'hui</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Nouveaux</div>
        <div class="stat-value accent-pink" id="stat-nouveaux">0</div>
        <div class="stat-trend">À traiter</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Confirmés</div>
        <div class="stat-value accent-green" id="stat-confirmes">0</div>
        <div class="stat-trend">RDV pris</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Durée moy.</div>
        <div class="stat-value accent-amber" id="stat-duree">—</div>
        <div class="stat-trend">Par appel</div>
      </div>
    </div>

    <!-- Table -->
    <div class="section-header">
      <h2 class="section-title">Derniers appels</h2>
    </div>

    <div class="table-container">
      <div id="table-wrapper"></div>
    </div>
  </main>
</div>

<!-- Modal détail -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Détail de l'appel</div>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
  let appels = [];

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' })
      + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  function renderTable() {
    const el = document.getElementById('table-wrapper');
    if (appels.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📞</div>
          <div class="empty-title">Aucun appel pour l'instant</div>
          <div class="empty-sub">Les données arriveront ici automatiquement depuis n8n</div>
          <div class="endpoint-box">POST /api/appel</div>
        </div>`;
      return;
    }
    el.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Problème</th>
            <th>RDV</th>
            <th>Résumé</th>
            <th>Durée</th>
            <th>Statut</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          ${appels.map((a, i) => `
            <tr onclick="openModal(${i})" style="cursor:pointer">
              <td>
                <div class="caller-info">
                  <span class="caller-name">${a.prenom} ${a.nom}</span>
                  <span class="caller-phone">${a.telephone}</span>
                </div>
              </td>
              <td><div class="probleme-text">${a.probleme || '—'}</div></td>
              <td style="font-size:13px; white-space:nowrap">${a.heure_rdv || '—'}</td>
              <td><div class="resume-text">${a.resume || '—'}</div></td>
              <td><span class="duree-text">${a.duree || '—'}</span></td>
              <td><span class="badge badge-${a.statut === 'confirmé' ? 'confirme' : 'nouveau'}">${a.statut}</span></td>
              <td><span class="date-text">${formatDate(a.date)}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>`;

    // Stats
    document.getElementById('stat-total').textContent = appels.length;
    document.getElementById('stat-nouveaux').textContent = appels.filter(a => a.statut === 'nouveau').length;
    document.getElementById('stat-confirmes').textContent = appels.filter(a => a.statut === 'confirmé').length;
  }

  function openModal(i) {
    const a = appels[i];
    document.getElementById('modal-title').textContent = `${a.prenom} ${a.nom}`;
    document.getElementById('modal-content').innerHTML = `
      <div class="info-grid">
        <div class="info-block"><label>Téléphone</label><div class="value">${a.telephone || '—'}</div></div>
        <div class="info-block"><label>Heure RDV</label><div class="value">${a.heure_rdv || '—'}</div></div>
        <div class="info-block"><label>Problème</label><div class="value">${a.probleme || '—'}</div></div>
        <div class="info-block"><label>Durée appel</label><div class="value">${a.duree || '—'}</div></div>
        <div class="info-block"><label>Date</label><div class="value">${formatDate(a.date)}</div></div>
        <div class="info-block"><label>Statut</label><div class="value">${a.statut}</div></div>
      </div>
      <div class="resume-block">
        <label>Résumé de la conversation</label>
        <p>${a.resume || 'Aucun résumé disponible.'}</p>
      </div>`;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal(e) {
    if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
  }

  async function loadAppels() {
    try {
      const r = await fetch('/api/appels');
      appels = await r.json();
      renderTable();
    } catch(e) {
      console.log('Erreur chargement:', e);
    }
  }

  async function addTestData() {
    await fetch('/api/test', { method: 'POST' });
    await loadAppels();
  }

  // Actualisation auto toutes les 10 secondes
  loadAppels();
  setInterval(loadAppels, 10000);
</script>
</body>
</html>
